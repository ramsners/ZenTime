name: easytime

services:
  db:
    image: mariadb:11
    container_name: easytime-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-easytime}
      MYSQL_USER: ${DB_USERNAME:-easytime}
      MYSQL_PASSWORD: ${DB_PASSWORD:-easytime}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/mariadb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  web:
    build: .
    container_name: easytime-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DRIVER: mysql
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  migrate:
    build: .
    profiles: ["migrate"]
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DRIVER: mysql
      SQLITE_SOURCE_PATH: /data/source.sqlite
    volumes:
      - ./database/database.sqlite:/data/source.sqlite:ro
      - ./scripts:/var/www/html/scripts:ro
      - ./app:/var/www/html/app:ro
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["php", "-d", "memory_limit=1G", "/var/www/html/scripts/migrate-sqlite-to-mariadb.php"]

volumes:
  db_data:
    name: easytime_db_data
